name: Hola Mundo

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  hola:
    runs-on: ubuntu-latest

    steps:
    - name: Hola Mundo
      run: echo "Hola mundo"

    - name: touch file
      run: touch hola.txt

    - name: Set text
      run: echo "Hola mundo" >> hola.txt

    - name: Read file
      run: cat hola.txt

    - name: checkout
      uses: actions/checkout@v4  
    
    - name: ls
      run: |
        chmod +x script.sh
        ./script.sh

  other:
    runs-on: ubuntu-latest
    needs: [hola]

    steps:
    - name: LS
      run: ls -al