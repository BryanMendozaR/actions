name: Hola Mundo

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  hola:
    runs-on: ubuntu-latest

    env:
      MY_VAR: Mi variable de entorno

    steps:
    - name: Test
      run: echo "Valor $MY_VAR"

    - name: Test2
      run: echo "Valor ${{ vars.MY_VARIABLE_2 }}"

    - name: Hola Mundo
      run: echo "Hola mundo"

    - name: touch file
      run: touch hola.txt

    - name: Set text
      run: echo "Hola mundo" >> hola.txt

    - name: Read file
      run: cat hola.txt

    - name: checkout
      uses: actions/checkout@v4  
    
    - name: ls
      run: |
        chmod +x .github/script.sh
        ./.github/script.sh

    - name: Setup Node.js environment
      uses: actions/setup-node@v6.4.0
      with:
        node-version: latest

    - name: node vesrion
      run: node --version

    - name: action
      uses: ./.github/actions/my-action
      with:
        message: "Bryan Mendoza"

  other:
    runs-on: ubuntu-latest
    needs: [hola]

    steps:
    - name: LS
      run: ls -al